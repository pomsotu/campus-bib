<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="capTop" x1="160" y1="18" x2="240" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="capRight" x1="200" y1="62" x2="240" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D14D0A"/>
      <stop offset="100%" stop-color="#B84308"/>
    </linearGradient>
    <linearGradient id="capLeft" x1="160" y1="62" x2="200" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#D14D0A"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="168" y1="85" x2="215" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="tasselGrad" x1="222" y1="48" x2="222" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="280" fill="#080B14"/>

  <!-- Icon (centered at top) -->
  <g transform="translate(140,20)">
    <!-- Cap top brim -->
    <path d="M60,16 Q62,16 100,38 Q102,39 100,41 L60,63 Q58,64 20,41 Q18,40 20,38 Z" fill="url(#capTop)"/>
    <!-- Right panel -->
    <path d="M60,63 L100,41 Q101,41 101,43 L101,56 Q101,57 100,58 L60,79 Q59,79 59,78 L59,64 Q59,63 60,63 Z" fill="url(#capRight)"/>
    <!-- Left panel -->
    <path d="M60,63 L20,41 Q19,41 19,43 L19,56 Q19,57 20,58 L60,79 Q61,79 61,78 L61,64 Q61,63 60,63 Z" fill="url(#capLeft)" opacity="0.9"/>
    <!-- Tassel -->
    <path d="M83,34 C83,34 84,50 83,65 Q83,68 82,72" stroke="url(#tasselGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="82" cy="75" r="4.5" fill="#F97316"/>
    <circle cx="82" cy="75" r="2.5" fill="#EA580C"/>
    <!-- Circuit traces -->
    <path d="M28,67 C28,72 28,80 28,84 Q28,87 31,87 L48,87" stroke="url(#tealGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M48,87 L62,87 Q65,87 65,90 L65,96" stroke="url(#tealGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M40,67 C40,70 40,74 40,76 Q40,79 43,79 L56,79" stroke="url(#tealGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Circuit nodes -->
    <circle cx="28" cy="67" r="4" fill="#2DD4BF"/>
    <circle cx="28" cy="67" r="2" fill="#5EEAD4" opacity="0.6"/>
    <circle cx="40" cy="67" r="4" fill="#2DD4BF"/>
    <circle cx="40" cy="67" r="2" fill="#5EEAD4" opacity="0.6"/>
    <circle cx="65" cy="96" r="4" fill="#2DD4BF"/>
    <circle cx="65" cy="96" r="2" fill="#5EEAD4" opacity="0.6"/>
    <circle cx="56" cy="79" r="4" fill="#2DD4BF"/>
    <circle cx="56" cy="79" r="2" fill="#5EEAD4" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="180" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="48" fill="#F1F5F9" letter-spacing="1">
    <tspan font-weight="300">Campus</tspan><tspan font-weight="700">BIB</tspan>
  </text>
  <!-- Tagline -->
  <text x="200" y="215" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#94A3B8" letter-spacing="2" font-weight="300">
    Your operations. Automated.
  </text>
</svg>
